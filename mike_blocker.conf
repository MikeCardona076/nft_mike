[ssh]
; Umbral de intentos fallidos antes de bloquear
threshold = 3

[scan]
; Rate limit de nuevas conexiones TCP por minuto desde una misma IP
conn_rate = 10

[cron]
; Intervalo en minutos para ejecutar mike_blocker.py
interval = 5

[whitelist]
; IPs o redes que nunca serán bloqueadas
; Formato: IP = descripción (opcional)
; Ej: 192.168.1.100 = Admin PC
;     10.0.0.0/24 = Red interna
